<!-- Sidebar -->
<aside class='c-sidebar js-off-canvas-container' id='sidebar' role='navigation' aria-label='Site navigation'>

  <div class='c-sidebar__logo'>
    <a class='c-sidebar__logo-link' href='{{ site.baseurl }}/'>{{ site.title }}</a>
    <p class='c-sidebar__tagline'>{{ site.description }}</p>
  </div>

  <nav class='c-sidebar__nav'>
    <p class='c-sidebar__section-label'>NAVIGATION</p>
    <ul class='c-sidebar__nav-list'>
      <li class='c-sidebar__nav-item'>
        <a class='c-sidebar__nav-link' href='{{ site.baseurl }}/'>📝 Posts</a>
      </li>
      {% include navigation.html %}
    </ul>
  </nav>

  <hr class='c-sidebar__divider'>

  <div class='c-sidebar__social'>
    <p class='c-sidebar__section-label'>CONNECT</p>
    <div class='c-sidebar__social-links'>
      <a class='c-sidebar__social-link' href='{{ site.twitter }}' target='_blank' rel='noopener' aria-label='Twitter'>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <a class='c-sidebar__social-link' href='{{ site.github }}' target='_blank' rel='noopener' aria-label='GitHub'>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
      </a>
      <a class='c-sidebar__social-link' href='/feed.xml' target='_blank' rel='noopener' aria-label='RSS Feed'>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg>
      </a>
    </div>
  </div>

</aside>

<!-- Mobile overlay -->
<div class='c-sidebar-overlay js-sidebar-overlay' id='sidebarOverlay'></div>

<!-- Mobile top bar -->
<div class='c-topbar' id='topbar' role='banner'>
  <button class='c-topbar__toggle js-off-canvas-toggle' aria-label='Toggle navigation' aria-expanded='false' aria-controls='sidebar'>
    <span class='c-topbar__toggle-icon'></span>
    <span class='c-topbar__toggle-icon'></span>
    <span class='c-topbar__toggle-icon'></span>
  </button>
  <a class='c-topbar__title' href='{{ site.baseurl }}/'>{{ site.title }}</a>
</div>
