---
layout: default
---
{% include base_path %}

{% if page.image %}
  <meta itemprop='og:image' content='{{ base_path }}{{ page.image }}'>
{% endif %}

<div class='o-wrapper'>
  <article class='c-post' itemscope itemtype='http://schema.org/BlogPosting'>
    <header class='c-post__header'>
      <h1 class='c-post__title' itemprop='name headline'>{{ page.title }}</h1>
      <time class='c-post__date' datetime='{{ page.date | date_to_xmlschema }}' itemprop='datePublished'>
        {{ page.date | date: '%d %B %Y' | upcase }}
      </time>
    </header>

    <div class='c-post__body c-content' itemprop='articleBody'>
      {% include page-image.html %}
      {{ content }}
    </div>

    {% if page.tags and page.tags.size > 0 %}
      <div class='c-tags'>
        {% for tag in page.tags %}
          <a class='c-tag' href='{{ site.baseurl }}/tag/{{ tag }}'>#{{ tag }}</a>
        {% endfor %}
      </div>
    {% endif %}
  </article>
</div>
